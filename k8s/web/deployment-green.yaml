apiVersion: apps/v1
kind: Deployment
metadata:
  name: ascend-web-green
  labels:
    app: ascend-web
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ascend-web
      version: green
  template:
    metadata:
      labels:
        app: ascend-web
        version: green
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: web
        image: ascend-web:latest # Will be replaced by CI
        securityContext:
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
