apiVersion: apps/v1
kind: Deployment
metadata:
  name: ascend-api-green
  labels:
    app: ascend-api
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ascend-api
      version: green
  template:
    metadata:
      labels:
        app: ascend-api
        version: green
    spec:
      containers:
      - name: api
        image: ascend-api:latest # Will be replaced by CI
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        envFrom:
        - secretRef:
            name: ascend-secrets
